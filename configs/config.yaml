server:
  port: 8080

integrations:
  mode: "mock"         # "mock" | "real"  (mock = use stub clients, real = live HTTP calls)

llm:
  provider: "anthropic"
  model: "claude-opus-4-5"
  api_key: ""          # set via ARGUS_LLM_API_KEY env var
  fallback_provider: "openai"
  fallback_model: "gpt-4o"
  fallback_api_key: "" # set via ARGUS_LLM_FALLBACK_API_KEY env var

slack:
  token: ""            # set via ARGUS_SLACK_TOKEN env var
  alerts_channel: "#incidents"
  approval_channel: "#ops-approvals"

prometheus:
  url: "http://prometheus:9090"

kubernetes:
  kubeconfig_path: ""  # empty = in-cluster config
  namespace: "default"

grafana:
  url: "http://grafana:3000"
  api_key: ""          # set via ARGUS_GRAFANA_API_KEY env var
  webhook_secret: ""   # set via ARGUS_GRAFANA_WEBHOOK_SECRET env var

pagerduty:
  integration_key: ""
  webhook_secret: ""   # set via ARGUS_PAGERDUTY_WEBHOOK_SECRET env var

runbooks:
  dir: "runbooks"
